name: Create Ariba Session

on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - run: pip install playwright
      - run: playwright install

      - name: Create persistent profile (headless workaround)
        run: python login.py

      - name: Upload profile
        uses: actions/upload-artifact@v4
        with:
          name: ariba-profile
          path: ariba_profile
