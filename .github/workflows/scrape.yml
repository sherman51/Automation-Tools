name: ALPS Sourcing Events Scraper

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:         # manual run button

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install system dependencies (IMPORTANT for Playwright)
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libatk-bridge2.0-0 libgtk-3-0 libgbm-dev

      # 4. Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps

      # 5. Restore Ariba profile (if you are using persistent login)
      # ⚠️ Only works if you uploaded it previously
      - name: Restore Ariba session (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ariba-profile

      # 6. Run scraper
      - name: Run scraper
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python main.py
