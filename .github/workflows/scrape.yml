name: ALPS Sourcing Events Scraper

on:
  schedule:
    - cron: "0 1 * * *"   # Runs daily at 1:00 AM UTC (9:00 AM Singapore time)
  workflow_dispatch:        # Also allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      ARIBA_USERNAME: ${{ secrets.ARIBA_USERNAME }}
      ARIBA_PASSWORD: ${{ secrets.ARIBA_PASSWORD }}
      ARIBA_COOKIES_JSON: ${{ secrets.ARIBA_COOKIES_JSON }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@latest  # pinned to @latest for auto version-matching

      - name: Verify Chrome installation
        run: |
          google-chrome --version
          chromedriver --version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ariba-debug-screenshots
          path: |
            /tmp/ariba_login_page.png
            /tmp/ariba_login_page.html
            /tmp/ariba_no_password.png
            /tmp/ariba_after_click.html
            /tmp/ariba_step1_login_page.png
            /tmp/ariba_step2_after_username.png
            /tmp/ariba_step2_after_username.html
            /tmp/ariba_step3_post_login.png
            /tmp/ss_01_dashboard.png
            /tmp/ss_02_typed_*.png
            /tmp/ss_03_results_*.png
            /tmp/ss_04_singapore_typed_*.png
            /tmp/ss_04_singapore_error_*.png
            /tmp/ss_05_singapore_filtered_*.png
            /tmp/ss_06_done_*.png
            /tmp/ariba_*.html
          retention-days: 3
          if-no-files-found: ignore
