name: ALPS Sourcing Events Scraper

on:
  schedule:
    - cron: "0 1 * * *"  # Daily at 1:00 AM UTC (9:00 AM Singapore time)
  workflow_dispatch:      # Manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Opt into Node 24, fixes deprecation warnings

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      ARIBA_USERNAME: ${{ secrets.ARIBA_USERNAME }}
      ARIBA_PASSWORD: ${{ secrets.ARIBA_PASSWORD }}
      ARIBA_COOKIES_JSON: ${{ secrets.ARIBA_COOKIES_JSON }}
      DEBUG_DIR: /tmp  # All debug screenshots/HTML dumps save here

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@latest

      - name: Verify Chrome installation
        run: |
          google-chrome --version
          chromedriver --version

      - name: Cache ChromeDriver
        uses: actions/cache@v4
        with:
          path: /tmp/wdm_cache
          key: chromedriver-${{ runner.os }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ariba-debug-screenshots
          path: |
            /tmp/ariba_*.png
            /tmp/ariba_*.html
            /tmp/ss_*.png
          retention-days: 3
          if-no-files-found: ignore
