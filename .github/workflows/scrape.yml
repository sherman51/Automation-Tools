name: ALPS Sourcing Events Scraper

on:
  schedule:
    - cron: "0 1 * * *"   # Runs daily at 1:00 AM UTC (9:00 AM Singapore time)
  workflow_dispatch:        # Also allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      ARIBA_USERNAME: ${{ secrets.ARIBA_USERNAME }}
      ARIBA_PASSWORD: ${{ secrets.ARIBA_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 gspread google-auth selenium

      - name: Install Chrome and ChromeDriver
        uses: browser-actions/setup-chrome@v1

      - name: Run scraper
        run: python main.py
